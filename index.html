<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Browser</title>
    <style>
        body { margin: 0; }
        #navigation { position: fixed; top: 0; left: 0; right: 0; background: #ccc; padding: 10px; }
        #addr { width: 70%; }
    </style>
</head>
<body>
    <div id="navigation">
        <button onclick="goBack()">Back</button>
        <button onclick="goForward()">Forward</button>
        <button onclick="reload()">Refresh</button>
        <input type="text" id="addr" placeholder="Enter URL..." />
        <button onclick="loadURL()">Go</button>
    </div>
    <iframe id="browser" src="https://www.wikipedia.org" style="width: 100%; height: calc(100% - 50px); border: none;"></iframe>
    <script>
        const iframe = document.getElementById('browser');
        const addr = document.getElementById('addr');

        function loadURL() {
            const url = addr.value;
            if (url.match(/^(https?:\/\/)?(www\.)?(wikipedia\.org|w3schools\.com|github\.com|codepen\.io|pages\.github\.com)/)) {
                iframe.src = url;
            } else {
                alert('Only Wikipedia, W3Schools, GitHub, CodePen, and GitHub Pages are allowed.');
            }
        }

        function goBack() {
            iframe.contentWindow.history.back();
        }

        function goForward() {
            iframe.contentWindow.history.forward();
        }

        function reload() {
            iframe.contentWindow.location.reload();
        }
    </script>
</body>
</html>
